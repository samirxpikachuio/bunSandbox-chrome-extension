<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sandbox</title>
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .control-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
    }
    textarea {
      height: 200px;
      font-family: monospace;
      margin-top: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled {
      background-color: #ccc;
    }
    #output {
      margin-top: 15px;
      padding: 10px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>🚀 Sandbox</h3>
  
  <div class="control-group">
    <label for="mode">Mode</label>
    <select id="mode">
      <option value="autonomous">Autonomous (WebContainer)</option>
      <option value="server">Server-Based</option>
    </select>
  </div>

  <div class="control-group">
    <label for="runtime">Runtime</label>
    <select id="runtime">
      <option value="node">Node.js (Default)</option>
      <option value="bun">Bun</option>
    </select>
  </div>

  <div class="control-group" id="packagesGroup" style="display:none;">
    <label for="packages">Packages (Space separated, e.g., 'lodash axios')</label>
    <input type="text" id="packages" placeholder="e.g. lodash axios" style="width:100%; box-sizing:border-box; padding:8px;">
  </div>

  <div class="control-group">
    <label for="code">Code</label>
    <textarea id="code" placeholder="console.log('Hello from ' + process.version);">console.log('Hello from ' + (typeof Bun !== 'undefined' ? 'Bun' : 'Node.js'));</textarea>
  </div>

  <div style="display: flex; gap: 10px;">
    <button id="runBtn" style="flex: 2;">Run Code</button>
    <button id="clearBtn" style="flex: 1; background-color: #6c757d;">Clear</button>
  </div>

  <div id="output">Output will appear here...</div>

  <script src="webcontainer-handler.js" type="module"></script>
  <script src="server-handler.js" type="module"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
